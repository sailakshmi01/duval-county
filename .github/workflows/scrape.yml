name: Florida Motivated Seller Lead Scraper

on:
  schedule:
    # Run daily at 7:00 AM UTC (3:00 AM ET)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    name: Scrape Clerk Portal & Export
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}

    steps:
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------------
      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      # ---------------------------------------------------------------
      - name: Run scraper
        working-directory: scraper
        env:
          LOOKBACK_DAYS: ${{ env.LOOKBACK_DAYS }}
          # Uses GITHUB_TOKEN to push data files directly from the script
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scrape.js

      # ---------------------------------------------------------------
      # Data files are already pushed to GitHub via the scraper's built-in API push.
      # We only need to upload the dashboard folder for Pages deployment.

      # ---------------------------------------------------------------
      - name: Upload dashboard artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  # -----------------------------------------------------------------
  deploy-pages:
    name: Deploy Dashboard to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
