<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duval County Motivated Seller Leads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #f8fafc; }
    header .badge {
      background: #0ea5e9;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }
    .meta {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0.75rem 2rem;
      font-size: 0.8rem;
      color: #94a3b8;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .meta span strong { color: #f1f5f9; }
    .controls {
      padding: 1rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls input, .controls select {
      background: #1e293b;
      border: 1px solid #475569;
      color: #e2e8f0;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .controls input { width: 220px; }
    .controls label { font-size: 0.8rem; color: #94a3b8; }
    .controls button {
      background: #0ea5e9;
      color: #fff;
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .controls button:hover { background: #0284c7; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead th {
      background: #1e293b;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.6rem 0.75rem;
      text-align: left;
      position: sticky;
      top: 0;
      border-bottom: 1px solid #334155;
    }
    tbody tr { border-bottom: 1px solid #1e293b; transition: background 0.1s; }
    tbody tr:hover { background: #1e293b; }
    tbody td { padding: 0.55rem 0.75rem; vertical-align: top; }
    .score-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .score-pill {
      display: inline-block;
      min-width: 36px;
      text-align: center;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    .score-high   { background: #dc2626; color: #fff; }
    .score-med    { background: #d97706; color: #fff; }
    .score-low    { background: #059669; color: #fff; }
    .flag-chip {
      display: inline-block;
      background: #1e3a5f;
      color: #7dd3fc;
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      margin: 0.1rem 0.15rem 0.1rem 0;
      white-space: nowrap;
    }
    a.doc-link { color: #38bdf8; text-decoration: none; font-family: monospace; font-size: 0.75rem; }
    a.doc-link:hover { text-decoration: underline; }
    .table-wrap { overflow-x: auto; padding: 0 2rem 2rem; }
    .empty { text-align: center; padding: 4rem; color: #475569; }
    .type-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: #334155;
      color: #94a3b8;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
<header>
  <h1>Duval County Motivated Seller Leads</h1>
  <span class="badge">LIVE</span>
</header>

<div class="meta" id="meta">
  <span>Loading…</span>
</div>

<div class="controls">
  <label>
    Search:&nbsp;
    <input type="text" id="search" placeholder="Owner, address, doc #…" oninput="renderTable()" />
  </label>
  <label>
    Type:&nbsp;
    <select id="filterType" onchange="renderTable()">
      <option value="">All types</option>
    </select>
  </label>
  <label>
    Min score:&nbsp;
    <select id="filterScore" onchange="renderTable()">
      <option value="0">Any</option>
      <option value="50">50+</option>
      <option value="60">60+</option>
      <option value="70">70+</option>
      <option value="80">80+</option>
    </select>
  </label>
  <button onclick="downloadCSV()">Download CSV</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Score</th>
        <th>Doc #</th>
        <th>Type</th>
        <th>Filed</th>
        <th>Owner / Grantor</th>
        <th>Amount</th>
        <th>Property Address</th>
        <th>Flags</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="8" class="empty">Loading records…</td></tr>
    </tbody>
  </table>
</div>

<script>
let allRecords = [];

async function loadData() {
  try {
    const res = await fetch('records.json?_=' + Date.now());
    const data = await res.json();
    allRecords = data.records || [];

    const meta = document.getElementById('meta');
    meta.innerHTML = [
      `<span>Fetched: <strong>${data.fetched_at || '—'}</strong></span>`,
      `<span>Date range: <strong>${data.date_range || '—'}</strong></span>`,
      `<span>Total records: <strong>${data.total || 0}</strong></span>`,
      `<span>With address: <strong>${data.with_address || 0}</strong></span>`,
    ].join('');

    // Populate type filter
    const types = [...new Set(allRecords.map(r => r.doc_type).filter(Boolean))].sort();
    const sel = document.getElementById('filterType');
    types.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      sel.appendChild(opt);
    });

    renderTable();
  } catch (e) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="8" class="empty">No records found. Run the scraper first.</td></tr>';
    document.getElementById('meta').innerHTML = '<span>No data loaded</span>';
  }
}

function scoreClass(s) {
  if (s >= 70) return 'score-high';
  if (s >= 50) return 'score-med';
  return 'score-low';
}

function fmt(v) { return v || ''; }
function fmtAmount(a) {
  if (!a) return '—';
  return '$' + Number(a).toLocaleString('en-US', { minimumFractionDigits: 0 });
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filterType = document.getElementById('filterType').value;
  const minScore = parseInt(document.getElementById('filterScore').value) || 0;

  const filtered = allRecords.filter(r => {
    if (filterType && r.doc_type !== filterType) return false;
    if (r.score < minScore) return false;
    if (q) {
      const hay = [r.owner, r.prop_address, r.doc_num, r.doc_type, r.grantee].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="8" class="empty">No matching records.</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = filtered.map(r => `
    <tr>
      <td><span class="score-pill ${scoreClass(r.score)}">${r.score}</span></td>
      <td>
        ${r.clerk_url
          ? `<a class="doc-link" href="${r.clerk_url}" target="_blank" rel="noopener">${fmt(r.doc_num)}</a>`
          : `<span style="font-family:monospace;font-size:.75rem">${fmt(r.doc_num)}</span>`}
      </td>
      <td><span class="type-badge">${fmt(r.doc_type)}</span></td>
      <td style="white-space:nowrap">${fmt(r.filed)}</td>
      <td>${fmt(r.owner)}</td>
      <td style="white-space:nowrap">${fmtAmount(r.amount)}</td>
      <td>
        ${r.prop_address ? `${r.prop_address}<br><small style="color:#94a3b8">${r.prop_city || ''} ${r.prop_state || ''} ${r.prop_zip || ''}</small>` : '<span style="color:#475569">—</span>'}
      </td>
      <td>${(r.flags || []).map(f => `<span class="flag-chip">${f}</span>`).join('')}</td>
    </tr>
  `).join('');
}

function downloadCSV() {
  const q = document.getElementById('search').value.toLowerCase();
  const filterType = document.getElementById('filterType').value;
  const minScore = parseInt(document.getElementById('filterScore').value) || 0;
  const filtered = allRecords.filter(r => {
    if (filterType && r.doc_type !== filterType) return false;
    if (r.score < minScore) return false;
    if (q) {
      const hay = [r.owner, r.prop_address, r.doc_num, r.doc_type].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const cols = ['doc_num','doc_type','filed','cat_label','owner','grantee','amount',
                 'prop_address','prop_city','prop_state','prop_zip',
                 'mail_address','mail_city','mail_state','mail_zip',
                 'clerk_url','score','flags'];
  const lines = [cols.join(',')];
  filtered.forEach(r => {
    lines.push(cols.map(c => {
      const v = c === 'flags' ? (r.flags||[]).join('; ') : (r[c] ?? '');
      const s = String(v).replace(/"/g,'""');
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
    }).join(','));
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `duval_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

loadData();
</script>
</body>
</html>
