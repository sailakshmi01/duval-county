<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florida Motivated Seller Leads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #f8fafc; }
    .badge {
      background: #0ea5e9;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }
    .meta {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0.75rem 2rem;
      font-size: 0.8rem;
      color: #94a3b8;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .meta span strong { color: #f1f5f9; }
    /* Stats pills row */
    .stats-row {
      padding: 0.75rem 2rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #1e293b;
    }
    .stat-pill {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .stat-pill:hover, .stat-pill.active { background: #334155; }
    .stat-pill strong { color: #38bdf8; margin-right: 0.25rem; }
    .stat-pill span   { color: #94a3b8; }
    .controls {
      padding: 1rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls input, .controls select {
      background: #1e293b;
      border: 1px solid #475569;
      color: #e2e8f0;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .controls input { width: 220px; }
    .controls label { font-size: 0.8rem; color: #94a3b8; }
    .controls button {
      background: #0ea5e9;
      color: #fff;
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .controls button:hover { background: #0284c7; }
    .result-count {
      margin-left: auto;
      font-size: 0.8rem;
      color: #64748b;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead th {
      background: #1e293b;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      padding: 0.6rem 0.75rem;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1;
      border-bottom: 1px solid #334155;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: #e2e8f0; }
    thead th.sorted-asc::after  { content: " ▲"; }
    thead th.sorted-desc::after { content: " ▼"; }
    tbody tr { border-bottom: 1px solid #1e293b; transition: background 0.1s; }
    tbody tr:hover { background: #1e293b; }
    tbody td { padding: 0.55rem 0.75rem; vertical-align: top; }
    .score-pill {
      display: inline-block;
      min-width: 36px;
      text-align: center;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    .score-high { background: #dc2626; color: #fff; }
    .score-med  { background: #d97706; color: #fff; }
    .score-low  { background: #059669; color: #fff; }
    .flag-chip {
      display: inline-block;
      background: #1e3a5f;
      color: #7dd3fc;
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      margin: 0.1rem 0.1rem 0.1rem 0;
      white-space: nowrap;
    }
    a.doc-link { color: #38bdf8; text-decoration: none; font-family: monospace; font-size: 0.75rem; }
    a.doc-link:hover { text-decoration: underline; }
    .table-wrap { overflow-x: auto; padding: 0 0 2rem; }
    .empty { text-align: center; padding: 4rem; color: #475569; }
    .type-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: #334155;
      color: #94a3b8;
    }
    .cat-badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      margin-top: 2px;
    }
    .cat-foreclosure { background:#450a0a; color:#fca5a5; }
    .cat-tax         { background:#422006; color:#fdba74; }
    .cat-judgment    { background:#2d1b69; color:#c4b5fd; }
    .cat-lien        { background:#0c2340; color:#7dd3fc; }
    .cat-probate     { background:#064e3b; color:#6ee7b7; }
    .cat-noc         { background:#1c1917; color:#a8a29e; }
    .cat-release     { background:#1c1917; color:#6b7280; }
    .county-chip {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      background: #0f2f4a;
      color: #67e8f9;
    }
  </style>
</head>
<body>
<header>
  <h1>Florida Motivated Seller Leads</h1>
  <span class="badge">LIVE</span>
  <span style="margin-left:auto;font-size:0.75rem;color:#64748b">Auto-updated daily · Duval County Clerk of Courts</span>
</header>

<div class="meta" id="meta">
  <span>Loading…</span>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="controls">
  <label>
    Search:&nbsp;
    <input type="text" id="search" placeholder="Owner, address, doc #…" oninput="renderTable()" />
  </label>
  <label>
    County:&nbsp;
    <select id="filterCounty" onchange="renderTable()">
      <option value="">All counties</option>
    </select>
  </label>
  <label>
    Category:&nbsp;
    <select id="filterCat" onchange="renderTable()">
      <option value="">All categories</option>
      <option value="foreclosure">Pre/Post-Foreclosure</option>
      <option value="tax">Tax Lien / Tax Deed</option>
      <option value="judgment">Judgment / Lien</option>
      <option value="lien">Lien / UCC</option>
      <option value="probate">Probate / Estate</option>
      <option value="noc">Notice of Commencement</option>
      <option value="release">Release</option>
    </select>
  </label>
  <label>
    Doc type:&nbsp;
    <select id="filterType" onchange="renderTable()">
      <option value="">All types</option>
    </select>
  </label>
  <label>
    Min score:&nbsp;
    <select id="filterScore" onchange="renderTable()">
      <option value="0">Any</option>
      <option value="40">40+</option>
      <option value="50">50+</option>
      <option value="60">60+</option>
      <option value="70">70+</option>
      <option value="80">80+</option>
    </select>
  </label>
  <button onclick="downloadCSV()">⬇ Download CSV</button>
  <span class="result-count" id="resultCount"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('score')">Score</th>
        <th onclick="sortBy('doc_num')">Doc #</th>
        <th>County</th>
        <th>Category</th>
        <th onclick="sortBy('doc_type')">Type</th>
        <th onclick="sortBy('filed')">Filed</th>
        <th onclick="sortBy('owner')">Owner / Grantor</th>
        <th onclick="sortBy('amount')">Amount</th>
        <th>Property Address</th>
        <th>Flags</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="10" class="empty">Loading records…</td></tr>
    </tbody>
  </table>
</div>

<script>
let allRecords = [];
let sortCol    = "score";
let sortDir    = "desc";

const CAT_CLASS = {
  foreclosure: "cat-foreclosure",
  tax:         "cat-tax",
  judgment:    "cat-judgment",
  lien:        "cat-lien",
  probate:     "cat-probate",
  noc:         "cat-noc",
  release:     "cat-release",
};

function scoreClass(s) {
  if (s >= 70) return "score-high";
  if (s >= 50) return "score-med";
  return "score-low";
}
function fmt(v)  { return v || "—"; }
function fmtAmt(v) {
  if (!v) return "—";
  return "$" + Number(v).toLocaleString();
}

// ---------------------------------------------------------------------------
// Load
// ---------------------------------------------------------------------------
async function loadData() {
  try {
    const RAW = "https://raw.githubusercontent.com/sailakshmi01/duval-county/main/dashboard/records.json";
    const res  = await fetch(RAW + "?_=" + Date.now());
    const data = await res.json();
    allRecords = data.records || [];

    // Meta bar
    document.getElementById("meta").innerHTML = [
      `<span>Fetched: <strong>${data.fetched_at || "—"}</strong></span>`,
      `<span>Date range: <strong>${data.date_range || "—"}</strong></span>`,
      `<span>Total records: <strong>${data.total || 0}</strong></span>`,
      `<span>With address: <strong>${data.with_address || 0}</strong></span>`,
    ].join("");

    // Stats pills
    buildStats(data);

    // Populate county filter
    const counties = [...new Set(allRecords.map(r => r.county).filter(Boolean))].sort();
    const sel = document.getElementById("filterCounty");
    counties.forEach(c => {
      const opt = document.createElement("option");
      opt.value = opt.textContent = c;
      sel.appendChild(opt);
    });

    // Populate doc type filter
    const types = [...new Set(allRecords.map(r => r.doc_type).filter(Boolean))].sort();
    const tsel  = document.getElementById("filterType");
    types.forEach(t => {
      const opt = document.createElement("option");
      opt.value = opt.textContent = t;
      tsel.appendChild(opt);
    });

    renderTable();
  } catch(e) {
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="10" class="empty">Error loading data: ${e.message}</td></tr>`;
  }
}

function buildStats(data) {
  const container = document.getElementById("statsRow");
  if (!container) return;
  const pills = [];

  // By category
  const cats = {};
  for (const r of allRecords) cats[r.cat] = (cats[r.cat] || 0) + 1;
  const catLabels = {
    foreclosure: "Foreclosure",
    tax:         "Tax Deed",
    judgment:    "Judgment",
    lien:        "Lien / UCC",
    probate:     "Probate",
    noc:         "NOC",
    release:     "Release",
  };
  for (const [cat, label] of Object.entries(catLabels)) {
    if (cats[cat]) {
      pills.push(`<div class="stat-pill" onclick="filterCategory('${cat}')">
        <strong>${cats[cat]}</strong><span>${label}</span>
      </div>`);
    }
  }

  // By county
  if (data.by_county && Object.keys(data.by_county).length > 1) {
    for (const [county, count] of Object.entries(data.by_county)) {
      pills.push(`<div class="stat-pill" onclick="filterCounty('${county}')">
        <strong>${count}</strong><span>${county}</span>
      </div>`);
    }
  }

  // High score
  const hot = allRecords.filter(r => r.score >= 70).length;
  if (hot) pills.push(`<div class="stat-pill" onclick="filterMinScore(70)">
    <strong>${hot}</strong><span>Score 70+</span>
  </div>`);

  container.innerHTML = pills.join("");
}

function filterCategory(cat)   { document.getElementById("filterCat").value = cat; renderTable(); }
function filterCounty(county)  { document.getElementById("filterCounty").value = county; renderTable(); }
function filterMinScore(score) { document.getElementById("filterScore").value = score; renderTable(); }

// ---------------------------------------------------------------------------
// Sort
// ---------------------------------------------------------------------------
function sortBy(col) {
  if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortCol = col; sortDir = col === "score" ? "desc" : "asc"; }
  document.querySelectorAll("thead th").forEach(th => {
    th.classList.remove("sorted-asc", "sorted-desc");
  });
  event.target.classList.add(sortDir === "asc" ? "sorted-asc" : "sorted-desc");
  renderTable();
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function filtered() {
  const q          = document.getElementById("search").value.toLowerCase();
  const county     = document.getElementById("filterCounty").value;
  const cat        = document.getElementById("filterCat").value;
  const type       = document.getElementById("filterType").value;
  const minScore   = parseInt(document.getElementById("filterScore").value) || 0;

  return allRecords.filter(r => {
    if (county && r.county !== county) return false;
    if (cat    && r.cat    !== cat)    return false;
    if (type   && r.doc_type !== type) return false;
    if (r.score < minScore)            return false;
    if (q) {
      const hay = [r.owner, r.prop_address, r.doc_num, r.doc_type, r.county, r.legal]
        .join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderTable() {
  let rows = filtered();

  // Sort
  rows.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === "number") return sortDir === "asc" ? av - bv : bv - av;
    av = String(av || ""); bv = String(bv || "");
    return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  document.getElementById("resultCount").textContent = `${rows.length.toLocaleString()} records`;

  if (!rows.length) {
    document.getElementById("tbody").innerHTML =
      '<tr><td colspan="10" class="empty">No matching records.</td></tr>';
    return;
  }

  document.getElementById("tbody").innerHTML = rows.slice(0, 500).map(r => {
    const catCls = CAT_CLASS[r.cat] || "";
    return `<tr>
      <td><span class="score-pill ${scoreClass(r.score)}">${r.score}</span></td>
      <td>${r.clerk_url
        ? `<a class="doc-link" href="${r.clerk_url}" target="_blank" rel="noopener">${fmt(r.doc_num)}</a>`
        : `<span style="font-family:monospace;font-size:.75rem">${fmt(r.doc_num)}</span>`}
      </td>
      <td><span class="county-chip">${fmt(r.county)}</span></td>
      <td><span class="cat-badge ${catCls}">${fmt(r.cat_label)}</span></td>
      <td><span class="type-badge">${fmt(r.doc_type)}</span></td>
      <td style="white-space:nowrap">${fmt(r.filed)}</td>
      <td>${fmt(r.owner)}</td>
      <td style="white-space:nowrap">${fmtAmt(r.amount)}</td>
      <td>${r.prop_address
        ? `${r.prop_address}<br><small style="color:#94a3b8">${r.prop_city || ""} ${r.prop_state || ""} ${r.prop_zip || ""}</small>`
        : '<span style="color:#475569">—</span>'}
      </td>
      <td>${(r.flags || []).map(f => `<span class="flag-chip">${f}</span>`).join("")}</td>
    </tr>`;
  }).join("");

  if (rows.length > 500) {
    document.getElementById("tbody").innerHTML +=
      `<tr><td colspan="10" class="empty" style="padding:1rem">
        Showing first 500 of ${rows.length.toLocaleString()} — use filters to narrow down
      </td></tr>`;
  }
}

// ---------------------------------------------------------------------------
// CSV Download
// ---------------------------------------------------------------------------
function downloadCSV() {
  const rows = filtered();
  const cols = ["doc_num","county","doc_type","cat_label","filed","owner","grantee","amount",
                "prop_address","prop_city","prop_state","prop_zip",
                "mail_address","mail_city","mail_state","mail_zip",
                "clerk_url","score","flags"];
  const lines = [cols.join(",")];
  rows.forEach(r => {
    lines.push(cols.map(c => {
      const v = c === "flags" ? (r.flags||[]).join("; ") : (r[c] ?? "");
      const s = String(v).replace(/"/g,'""');
      return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s}"` : s;
    }).join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `fl_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

loadData();
</script>
</body>
</html>
